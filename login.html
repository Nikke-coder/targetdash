<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>targetdash - Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#0e0e16;--panel:rgba(255,255,255,0.04);--phi:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.08);--bhi:rgba(255,255,255,0.14);--v:#7c3aed;--vh:#9d5ffc;--lilac:#c4b5fd;--w:#fff;--text:#f1f0f5;--mid:#8b8a9a;--dim:#3d3c52;--green:#34d399;--red:#f87171;--sans:'Outfit',sans-serif;--ui:'Instrument Sans',sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
.ctr{min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{text-align:center;max-width:340;width:100%;padding:0 20px}
.logo{font-size:28px;font-weight:700;letter-spacing:-0.03em;margin-bottom:6px}.logo span{color:var(--vh)}
.sub{font-family:'DM Mono',monospace;font-size:12px;color:#5a5580;margin-bottom:40px}
.inp{width:100%;padding:12px 14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;outline:none;font-family:var(--ui);font-size:14px;color:var(--text);margin-bottom:12px;box-sizing:border-box;transition:border-color .2s}
.inp:focus{border-color:rgba(124,58,237,0.5)}.inp::placeholder{color:var(--dim)}
.btn{width:100%;padding:13px;background:var(--v);border:none;border-radius:10px;font-family:var(--ui);font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:var(--vh)}.btn:disabled{opacity:.6;cursor:not-allowed}
.ggl{width:100%;padding:13px;background:var(--phi);border:1px solid var(--bhi);border-radius:10px;cursor:pointer;font-family:var(--ui);font-size:14px;font-weight:500;color:var(--text);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.ggl:hover{background:rgba(255,255,255,0.1)}.ggl:disabled{opacity:.6;cursor:not-allowed}
.ggl svg{width:18px;height:18px}
.tgl{background:none;border:none;color:var(--mid);font-family:var(--ui);font-size:12px;cursor:pointer;text-decoration:underline;opacity:.7}.tgl:hover{opacity:1}
.dv{display:flex;align-items:center;gap:12px;margin:20px 0}.dl{flex:1;height:1px;background:var(--border)}.dt{font-family:var(--ui);font-size:11px;color:var(--dim)}
.mb{display:none;padding:12px 14px;border-radius:10px;font-family:var(--ui);font-size:13px;line-height:1.5;margin-bottom:16px}
.mb.error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:var(--red);display:block}
.sp{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="ctr">
  <div class="box">
    <div class="logo">targetdash<span>›</span></div>
    <div class="sub">financial intelligence</div>
    <div class="mb" id="msg"></div>
    <div id="form">
      <input type="email" class="inp" id="email" placeholder="Enter your work email" autocomplete="email"/>
      <div id="pwf" style="display:none"><input type="password" class="inp" id="pw" placeholder="Password" autocomplete="current-password"/></div>
      <button class="btn" id="mainbtn">&#9993; Send sign-in link</button>
      <div style="text-align:center;margin-top:10px"><button class="tgl" id="tgl">Sign in with password instead</button></div>
      <div class="dv"><div class="dl"></div><div class="dt">or</div><div class="dl"></div></div>
      <button class="ggl" id="gbtn"><svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google</button>
      <div style="text-align:center;margin-top:24px;font-family:var(--ui);font-size:12px;color:var(--dim)">Access is by invitation only. <a href="mailto:niklas@targetdash.ai" style="color:var(--lilac);text-decoration:none">Contact us</a></div>
    </div>
    <div id="sent" style="display:none;padding:20px 0;">
      <div style="font-size:48px;margin-bottom:16px">&#128231;</div>
      <div style="font-size:20px;font-weight:700;color:var(--w);margin-bottom:8px">Check your email</div>
      <div style="font-family:var(--ui);font-size:13px;color:var(--mid);line-height:1.6;margin-bottom:20px">We sent a sign-in link to<br/><span id="sentTo" style="color:var(--lilac);font-weight:600"></span><br/><br/>Click the link to sign in. Check spam if needed.</div>
      <button onclick="document.getElementById('form').style.display='';document.getElementById('sent').style.display='none';" style="background:none;border:1px solid var(--border);border-radius:10px;padding:10px 20px;color:var(--mid);font-family:var(--ui);font-size:13px;cursor:pointer">Back</button>
    </div>
  </div>
</div>
<script>
var SB_URL='https://nghlvfngpfrhhigkoeem.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5naGx2Zm5ncGZyaGhpZ2tvZWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDQyMTgsImV4cCI6MjA4OTIyMDIxOH0.Y4JF1x0m5BKa-btWkQAr1wY1EyTK30nck-hSL2eSNPE';
var sb=supabase.createClient(SB_URL,SB_KEY);
var mode='magic',done=false;

// Check if we need onboarding (came from invite) or can skip to app
var needsOnboarding=new URLSearchParams(window.location.search).get('onboard')==='1';

async function route(session){
  if(done||!session)return;done=true;
  var p=null;
  var r=await sb.from('user_profiles').select('onboarded,plan,agreed_terms,agreed_dpa').eq('user_id',session.user.id).maybeSingle();
  p=r.data;
  if(!p&&session.user.email){
    var r2=await sb.from('user_profiles').select('onboarded,plan,agreed_terms,agreed_dpa').eq('email',session.user.email).maybeSingle();
    if(r2.data){await sb.from('user_profiles').update({user_id:session.user.id,updated_at:new Date().toISOString()}).eq('email',session.user.email);p=r2.data;}
  }
  var plan=p?p.plan:null;
  // Onboarded + terms done = go straight to app (sign in there)
  if((plan==='mainuser'||plan==='superuser')&&p.onboarded&&p.agreed_terms&&p.agreed_dpa){
    window.location.href='https://app.targetdash.ai';return;
  }
  // Needs onboarding or terms
  if((plan==='mainuser'||plan==='superuser')&&p.onboarded&&(!p.agreed_terms||!p.agreed_dpa)){
    window.location.href='/onboarding?mode=legal';return;
  }
  if(plan==='mainuser'||plan==='superuser'){
    window.location.href='/onboarding?mode=invite';return;
  }
  done=false;
  smsg('No invitation found for this email. Access is by invitation only.');
  await sb.auth.signOut();
}

// If already has session and doesn't need onboarding, go to app
(async function(){
  var s=await sb.auth.getSession();
  if(s.data.session){
    if(!needsOnboarding){await route(s.data.session);}
    else{await route(s.data.session);}
  }
})();
sb.auth.onAuthStateChange(function(ev,s){if(ev==='SIGNED_IN')route(s);});

var $=document.getElementById.bind(document);

$('tgl').onclick=function(){
  mode=mode==='magic'?'password':'magic';
  $('pwf').style.display=mode==='password'?'block':'none';
  $('mainbtn').innerHTML=mode==='password'?'Sign in &#8594;':'&#9993; Send sign-in link';
  $('tgl').textContent=mode==='password'?'Sign in with magic link instead':'Sign in with password instead';
  $('msg').className='mb';
};

$('mainbtn').onclick=async function(){
  var email=$('email').value.trim();
  if(!email||email.indexOf('@')<0){smsg('Please enter a valid email.');return;}
  var btn=$('mainbtn');btn.disabled=true;
  if(mode==='password'){
    var pw=$('pw').value;
    if(!pw||pw.length<6){smsg('Please enter your password.');btn.disabled=false;return;}
    btn.innerHTML='<span class="sp"></span> Signing in...';
    var r=await sb.auth.signInWithPassword({email:email,password:pw});
    btn.disabled=false;btn.innerHTML='Sign in &#8594;';
    if(r.error){
      smsg(r.error.message==='Invalid login credentials'?'Invalid email or password.':r.error.message);
      try{fetch('https://app.targetdash.ai/api/security',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event_type:'failed_login',severity:'medium',email:email,details:{method:'password',source:'www'}})});}catch(x){}
    }
  }else{
    btn.innerHTML='<span class="sp"></span> Sending...';
    var r=await sb.auth.signInWithOtp({email:email,options:{emailRedirectTo:'https://app.targetdash.ai'}});
    btn.disabled=false;btn.innerHTML='&#9993; Send sign-in link';
    if(r.error){smsg(r.error.message);return;}
    $('sentTo').textContent=email;$('form').style.display='none';$('sent').style.display='block';
  }
};

$('gbtn').onclick=async function(){$('gbtn').disabled=true;$('gbtn').style.opacity='0.6';await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:'https://app.targetdash.ai'}});};
$('email').onkeydown=function(e){if(e.key==='Enter'){if(mode==='password')$('pw').focus();else $('mainbtn').click();}};
