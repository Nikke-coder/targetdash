<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>targetdash › god mode</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --void:#03040a;--ink:#080a10;
  --b:rgba(255,255,255,0.06);--bhi:rgba(255,255,255,0.1);
  --ion:#4fc3f7;--ion-lo:rgba(79,195,247,0.07);
  --ion-glow:0 0 40px rgba(79,195,247,0.4),0 0 100px rgba(79,195,247,0.15);
  --t:#e8eaf0;--mid:#4a5568;--dim:#232b38;
  --green:#4caf82;--amber:#d4a24c;--red:#c45c5c;--violet:#7c6aed;
  --serif:'Outfit',sans-serif;--mono:'Instrument Sans',sans-serif;
}
html,body{min-height:100vh;background:var(--void);color:var(--t);font-family:var(--mono);overflow-x:hidden;}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── ENTRY ── */
#entry{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:transparent;transition:opacity 1.4s ease;}
#entry.out{opacity:0;pointer-events:none;}
.eg{
  font-family:var(--serif);font-size:76px;font-weight:600;font-style:italic;
  color:var(--ion);letter-spacing:-.02em;line-height:1;
  text-shadow:var(--ion-glow);
  opacity:0;animation:gin 2s ease forwards 0.3s;
  margin-bottom:18px;
}
.et{
  font-family:var(--mono);font-size:10px;letter-spacing:.4em;text-transform:uppercase;
  color:rgba(79,195,247,0.5);
  opacity:0;animation:gin 1s ease forwards 1.4s;
}
@keyframes gin{0%{opacity:0;filter:blur(12px);}70%{opacity:1;filter:blur(0);}100%{opacity:1;}}

/* ── NAV ── */
#ui{position:relative;z-index:10;min-height:100vh;display:none;}
nav{display:flex;align-items:center;justify-content:space-between;padding:22px 52px;border-bottom:1px solid var(--b);}
.brand{display:flex;align-items:baseline;gap:4px;text-decoration:none;}
.bn{font-family:var(--serif);font-size:16px;font-weight:400;color:var(--t);}
.bg{font-family:var(--serif);font-style:italic;color:var(--ion);font-size:18px;text-shadow:0 0 12px rgba(79,195,247,0.35);}
.bm{font-family:var(--mono);font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--mid);margin-left:10px;}
.nr{display:flex;align-items:center;gap:28px;}
#clock{font-size:10px;color:var(--mid);letter-spacing:.04em;font-variant-numeric:tabular-nums;}
.eb{background:none;border:none;font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);cursor:pointer;transition:color .2s;padding:0;}
.eb:hover{color:var(--red);}

/* ── MAIN ── */
.main{max-width:1280px;margin:0 auto;padding:48px 52px;}

/* ── HEADLINE ── */
.hl-wrap{margin-bottom:52px;}
.hl-sec{font-size:8px;letter-spacing:.35em;text-transform:uppercase;color:var(--dim);margin-bottom:14px;}
.hl{font-family:var(--serif);font-size:clamp(44px,4.5vw,66px);font-weight:300;font-style:italic;color:var(--t);line-height:1.04;letter-spacing:-.02em;}
.hl em{font-style:normal;color:var(--ion);}

/* ── METRICS ── */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--b);border:1px solid var(--b);margin-bottom:52px;}
.met{background:var(--void);padding:22px 20px;transition:background .2s;}
.met:hover{background:rgba(79,195,247,0.02);}
.mk{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
.mv{font-family:var(--serif);font-size:42px;font-weight:300;line-height:1;margin-bottom:4px;}
.ms{font-size:9px;color:var(--dim);letter-spacing:.04em;}

/* ── TWO-COL ── */
.two{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b);border:1px solid var(--b);margin-bottom:52px;}
.panel{background:var(--void);padding:28px 24px;}
.panel-title{font-family:var(--serif);font-size:22px;font-weight:400;font-style:italic;color:var(--t);margin-bottom:20px;}
.row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.row:last-child{border-bottom:none;}
.rl{font-size:10px;color:var(--mid);}
.rv{font-size:10px;}
.rsub{font-size:9px;color:var(--dim);margin-top:2px;}
.pip{display:inline-block;width:4px;height:4px;border-radius:50%;margin-right:7px;vertical-align:middle;}
.tag{font-size:8px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;}

/* ── CLIENT TABLE (ALL USERS) ── */
.sec-label{font-size:8px;letter-spacing:.35em;text-transform:uppercase;color:var(--dim);margin-bottom:16px;}
.search-row{display:flex;align-items:center;gap:20px;margin-bottom:20px;}
.sbox input{background:none;border:none;border-bottom:1px solid var(--b);font-family:var(--mono);font-size:11px;color:var(--t);outline:none;width:240px;padding:4px 0;letter-spacing:.02em;transition:border-color .2s;}
.sbox input:focus{border-bottom-color:var(--ion);}
.sbox input::placeholder{color:var(--dim);}

.user-table{border:1px solid var(--b);width:100%;border-collapse:collapse;}
.user-table th{padding:9px 16px;text-align:left;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);font-weight:400;border-bottom:1px solid var(--b);background:rgba(255,255,255,0.015);}
.user-table td{padding:13px 16px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;}
.user-table tbody tr:last-child td{border-bottom:none;}
.user-table tbody tr:hover td{background:rgba(79,195,247,0.015);}

.uname{font-family:var(--serif);font-size:15px;font-weight:400;color:var(--t);}
.uemail{font-size:9px;color:var(--dim);margin-top:1px;}

/* ROLE SELECT */
.role-sel{
  background:none;border:1px solid var(--b);border-radius:3px;
  font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--mid);padding:4px 8px;outline:none;cursor:pointer;transition:all .2s;
}
.role-sel:hover{border-color:var(--bhi);color:var(--t);}
.role-sel:focus{border-color:var(--ion);}
.role-sel option{background:#080a10;}

/* CREDIT CONTROLS */
.credit-wrap{display:flex;align-items:center;gap:8px;}
.credit-num{font-size:11px;color:var(--mid);min-width:28px;text-align:center;}
.cbtn{background:none;border:1px solid var(--b);width:22px;height:22px;border-radius:3px;font-family:var(--mono);font-size:13px;color:var(--mid);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;}
.cbtn:hover{border-color:var(--ion);color:var(--ion);}
.cbtn.minus:hover{border-color:var(--red);color:var(--red);}

/* OPEN BTN */
.open-btn{background:none;border:none;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ion);cursor:pointer;padding:0;transition:opacity .15s;}
.open-btn:hover{opacity:.7;}

.empty-state{padding:48px;text-align:center;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;z-index:999;background:var(--ink);border:1px solid var(--b);border-radius:6px;padding:10px 18px;font-size:10px;font-family:var(--mono);color:var(--t);letter-spacing:.04em;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:none;}

/* ANIMS */
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fi{opacity:0;animation:fu .5s ease forwards;}
.d1{animation-delay:.08s}.d2{animation-delay:.16s}.d3{animation-delay:.24s}.d4{animation-delay:.32s}

@media(max-width:1100px){.metrics{grid-template-columns:1fr 1fr;}.two{grid-template-columns:1fr;}}
@media(max-width:700px){.main{padding:24px;}nav{padding:16px 24px;}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="toast" id="toast"></div>

<!-- ENTRY -->
<div id="entry">
  <div class="eg">God Mode</div>
  <div class="et">Don't be evil.</div>
</div>

<!-- UI -->
<div id="ui">
  <nav>
    <div style="display:flex;align-items:baseline;">
      <a href="/" class="brand"><span class="bn">targetdash</span><span class="bg">&gt;</span></a>
      <span class="bm">god mode</span>
    </div>
    <div class="nr">
      <span id="clock"></span>
      <button class="eb" onclick="so()">disconnect</button>
    </div>
  </nav>
  <div class="main" id="main"></div>
</div>

<script>
// ── PARTICLES ─────────────────────────────────────────────────────────────
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,pts=[];
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
pts=Array.from({length:65},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vy:-(Math.random()*.4+.1),vx:(Math.random()-.5)*.15,r:Math.random()*1.2+.3,ph:Math.random()*Math.PI*2}));
(function frame(){
  if(document.getElementById('entry').style.display!=='none'){
    cx.fillStyle='rgba(3,4,10,0.88)';
    cx.fillRect(0,0,W,H);
  } else {
    cx.clearRect(0,0,W,H);
  }
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.ph+=.018;if(p.y<-10){p.y=H+10;p.x=Math.random()*W;}if(p.x<0)p.x=W;if(p.x>W)p.x=0;});
  for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){cx.beginPath();cx.strokeStyle=`rgba(79,195,247,${(1-d/130)*.14})`;cx.lineWidth=.4;cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.stroke();}}
  pts.forEach(p=>{const a=.3+.25*Math.sin(p.ph);cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=`rgba(79,195,247,${a})`;cx.fill();});
  requestAnimationFrame(frame);
})();

// ── SUPABASE ──────────────────────────────────────────────────────────────
const SU='https://nghlvfngpfrhhigkoeem.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5naGx2Zm5ncGZyaGhpZ2tvZWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDQyMTgsImV4cCI6MjA4OTIyMDIxOH0.Y4JF1x0m5BKa-btWkQAr1wY1EyTK30nck-hSL2eSNPE';
const SUPERS=['niklas.isaksson@targetflow.fi'];
const {createClient}=supabase;
const sb=createClient(SU,SK);
let cl=[],srch='';

setInterval(()=>{const e=document.getElementById('clock');if(!e)return;const n=new Date(),p=x=>String(x).padStart(2,'0');e.textContent=`${n.toISOString().split('T')[0]}  ${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;},1000);

(async()=>{
  await new Promise(r=>setTimeout(r,2200));
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='/login';return;}
  if(!SUPERS.includes(session.user.email)){window.location.href='/dashboard';return;}
  await load();
  document.getElementById('entry').classList.add('out');
  setTimeout(()=>{document.getElementById('entry').style.display='none';document.getElementById('ui').style.display='';render();},1400);
})();

async function load(){
  const [{data:prof},{data:cred}]=await Promise.all([
    sb.from('user_profiles').select('*').order('created_at',{ascending:false}),
    sb.from('demo_credits').select('user_id,credits_used'),
  ]);
  const cm={};(cred||[]).forEach(c=>cm[c.user_id]=c.credits_used);
  cl=(prof||[]).map(p=>({...p,credits_used:cm[p.user_id]||0}));
}

const fmt=d=>d?new Date(d).toLocaleDateString('fi-FI'):'—';
const ago=d=>{if(!d)return'—';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';};
const planColor=p=>p==='mainuser'?'var(--green)':p==='demo'?'var(--amber)':p==='inactive'?'var(--red)':p==='superuser'?'var(--ion)':'var(--dim)';

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function render(){
  const paid=cl.filter(c=>c.plan==='mainuser');
  const demo=cl.filter(c=>c.plan==='demo');
  const demoEx=demo.filter(c=>(c.credits_used||0)>=5);
  const demoAc=demo.filter(c=>(c.credits_used||0)<5);
  const recent=[...cl].slice(0,6);
  const mrr=paid.length*80;
  const conv=demo.length>0?Math.round(paid.length/demo.length*100):0;
  const pend=cl.filter(c=>!c.plan||c.plan==='subscribe').length;
  const inac=cl.filter(c=>c.plan==='inactive').length;

  const filtered=cl.filter(c=>{
    if(!srch)return true;
    const q=srch.toLowerCase();
    return c.company_name?.toLowerCase().includes(q)||c.email?.toLowerCase().includes(q);
  });

  document.getElementById('main').innerHTML=`
  <div class="hl-wrap fi d1">
    <div class="hl-sec">neural command interface</div>
    <h1 class="hl">All <em>minds</em><br>accounted for.</h1>
  </div>

  <div class="metrics fi d2">
    <div class="met"><div class="mk">MRR</div><div class="mv" style="color:var(--green)">€${mrr.toLocaleString()}</div><div class="ms">${paid.length}×€80/month</div></div>
    <div class="met"><div class="mk">Active clients</div><div class="mv" style="color:var(--green)">${paid.length}</div><div class="ms">paid MainUser</div></div>
    <div class="met"><div class="mk">Demo pipeline</div><div class="mv" style="color:var(--amber)">${demo.length}</div><div class="ms">${demoEx.length} exhausted</div></div>
    <div class="met"><div class="mk">Conversion</div><div class="mv" style="color:var(--ion)">${conv}<span style="font-size:22px;color:var(--dim)">%</span></div><div class="ms">demo→paid</div></div>
    <div class="met"><div class="mk">Total</div><div class="mv" style="color:var(--t)">${cl.length}</div><div class="ms">${pend} pending · ${inac} inactive</div></div>
  </div>

  <div class="two fi d3">
    <div class="panel">
      <div class="panel-title">Demo pipeline</div>
      ${demoEx.length===0&&demoAc.length===0
        ?`<div class="row"><span class="rl" style="color:var(--dim)">No demo users yet</span></div>`:''}
      ${demoEx.map(c=>`<div class="row">
        <div><div class="rl"><span class="pip" style="background:var(--amber)"></span>${c.company_name||c.email||'—'}</div><div class="rsub">Credits exhausted · ${fmt(c.created_at)}</div></div>
        <span class="tag" style="color:var(--amber)">upgrade now</span>
      </div>`).join('')}
      ${demoAc.map(c=>`<div class="row">
        <div><div class="rl"><span class="pip" style="background:var(--green)"></span>${c.company_name||c.email||'—'}</div><div class="rsub">${c.credits_used||0}/5 credits · ${fmt(c.created_at)}</div></div>
        <span class="tag" style="color:var(--green)">active</span>
      </div>`).join('')}
    </div>
    <div class="panel">
      <div class="panel-title">Recent signups</div>
      ${recent.length===0
        ?`<div class="row"><span class="rl" style="color:var(--dim)">No activity yet</span></div>`
        :recent.map(c=>`<div class="row">
          <div><div class="rl"><span class="pip" style="background:${planColor(c.plan)}"></span>${c.company_name||c.email||'—'}</div><div class="rsub">${c.email||''}</div></div>
          <div style="text-align:right;"><div class="tag" style="color:${planColor(c.plan)}">${c.plan||'pending'}</div><div class="rsub">${ago(c.created_at)}</div></div>
        </div>`).join('')}
    </div>
  </div>

  <div class="fi d4">
    <div class="sec-label">all users — role &amp; credit management</div>
    <div class="search-row">
      <div class="sbox"><input placeholder="search name or email…" value="${srch}" oninput="ss(this.value)" autocomplete="off"/></div>
    </div>
    ${filtered.length===0
      ?`<div style="border:1px solid var(--b);"><div class="empty-state">no users found</div></div>`
      :`<table class="user-table">
        <thead><tr>
          <th>Entity</th>
          <th>Plan / role</th>
          <th>Primary role</th>
          <th>AI credits</th>
          <th>Joined</th>
          <th>Access</th>
          <th></th>
        </tr></thead>
        <tbody>${filtered.map(urow).join('')}</tbody>
      </table>`}
  </div>`;
}

function urow(c){
  const uid=c.user_id;
  const cred=c.credits_used||0;
  const planCol=planColor(c.plan);
  const plans=['inactive','demo','subscribe','mainuser','superuser'];
  const planOpts=plans.map(p=>`<option value="${p}"${c.plan===p?' selected':''}>${p}</option>`).join('');
  const roles=['CEO','CFO','CMO','CRO','CTO','HR Manager'];
  const roleOpts=roles.map(r=>`<option value="${r}"${c.primary_role===r?' selected':''}>${r}</option>`).join('');
  return `<tr>
    <td>
      <div class="uname">${c.company_name||'—'}</div>
      <div class="uemail">${c.email||''}</div>
    </td>
    <td>
      <select class="role-sel" style="color:${planCol};border-color:${planCol}33;" onchange="updatePlan('${uid}',this.value)">${planOpts}</select>
    </td>
    <td>
      <select class="role-sel" onchange="updateRole('${uid}',this.value)">${roleOpts}</select>
    </td>
    <td>
      <div class="credit-wrap">
        <button class="cbtn minus" onclick="adjCredit('${uid}',-1)" title="Remove credit">−</button>
        <span class="credit-num">${cred}</span>
        <button class="cbtn" onclick="adjCredit('${uid}',1)" title="Add credit">+</button>
      </div>
    </td>
    <td style="font-size:10px;color:var(--mid);">${fmt(c.created_at)}</td>
    <td style="font-size:10px;color:var(--mid);">${fmt(c.plan_activated_at||c.agreed_at)}</td>
    <td><button class="open-btn" onclick="go('/dashboard')" title="Open dashboard">→</button></td>
  </tr>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
async function updatePlan(uid,plan){
  const {error}=await sb.from('user_profiles').update({plan,updated_at:new Date().toISOString()}).eq('user_id',uid);
  if(error){toast('Error: '+error.message);return;}
  const idx=cl.findIndex(c=>c.user_id===uid);
  if(idx>-1)cl[idx].plan=plan;
  toast('Plan updated');
  render();
}

async function updateRole(uid,role){
  const {error}=await sb.from('user_profiles').update({primary_role:role,updated_at:new Date().toISOString()}).eq('user_id',uid);
  if(error){toast('Error: '+error.message);return;}
  const idx=cl.findIndex(c=>c.user_id===uid);
  if(idx>-1)cl[idx].primary_role=role;
  toast('Role updated');
}

async function adjCredit(uid,delta){
  const idx=cl.findIndex(c=>c.user_id===uid);
  if(idx<0)return;
  const cur=cl[idx].credits_used||0;
  const next=Math.max(0,cur+delta);
  const {error}=await sb.from('demo_credits').upsert(
    {user_id:uid,user_email:cl[idx].email,credits_used:next},
    {onConflict:'user_id'}
  );
  if(error){toast('Error: '+error.message);return;}
  cl[idx].credits_used=next;
  toast(delta>0?'Credit added':'Credit removed');
  render();
}

function ss(s){srch=s;render();}
function go(u){window.location.href=u;}
async function so(){await sb.auth.signOut();window.location.href='/login';}
window.updatePlan=updatePlan;window.updateRole=updateRole;window.adjCredit=adjCredit;window.ss=ss;window.go=go;window.so=so;
</script>
</body>
</html>
