<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>targetdash › god mode</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --void:   #05060a;
  --ink:    #0a0c12;
  --veil:   #0f1118;
  --b:      rgba(255,255,255,0.06);
  --bhi:    rgba(255,255,255,0.12);
  --ion:    #4fc3f7;
  --ion-lo: rgba(79,195,247,0.08);
  --ion-md: rgba(79,195,247,0.15);
  --ion-glow: 0 0 30px rgba(79,195,247,0.2);
  --t:      #e8eaf0;
  --mid:    #5a6070;
  --dim:    #2a3040;
  --green:  #4caf82;
  --amber:  #d4a24c;
  --red:    #c45c5c;
  --serif:  'Cormorant Garamond', serif;
  --mono:   'IBM Plex Mono', monospace;
}

html, body {
  min-height: 100vh;
  background: var(--void);
  color: var(--t);
  font-family: var(--mono);
  overflow-x: hidden;
}

/* ── NEURAL CANVAS ── */
canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.55;
}

/* ── CONTENT LAYER ── */
#ui {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: none;
}

/* ── ENTRY SCREEN ── */
#entry {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--void);
  transition: opacity 1s ease;
}
#entry.fade { opacity: 0; pointer-events: none; }

.entry-glyph {
  font-family: var(--serif);
  font-size: 72px;
  font-weight: 300;
  font-style: italic;
  color: var(--ion);
  text-shadow: var(--ion-glow);
  line-height: 1;
  margin-bottom: 24px;
  opacity: 0;
  animation: appear 1.2s ease forwards 0.3s;
}
.entry-sub {
  font-size: 9px;
  letter-spacing: .4em;
  text-transform: uppercase;
  color: var(--mid);
  opacity: 0;
  animation: appear 1s ease forwards 0.9s;
}
.entry-line {
  width: 1px; height: 60px;
  background: linear-gradient(to bottom, var(--ion), transparent);
  box-shadow: 0 0 8px var(--ion);
  margin-bottom: 24px;
  opacity: 0;
  animation: appear 1s ease forwards 0.6s;
}
@keyframes appear { to { opacity: 1; } }

/* ── NAV ── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 52px;
  border-bottom: 1px solid var(--b);
}
.nav-brand {
  display: flex; align-items: baseline; gap: 6px;
  text-decoration: none;
}
.nav-brand-name {
  font-family: var(--serif);
  font-size: 18px; font-weight: 400;
  color: var(--t); letter-spacing: -.01em;
}
.nav-brand-mode {
  font-size: 9px; letter-spacing: .3em;
  text-transform: uppercase; color: var(--ion);
  font-family: var(--mono);
}
.nav-right { display: flex; align-items: center; gap: 32px; }
.nav-clock { font-size: 10px; color: var(--mid); letter-spacing: .05em; }
.nav-exit {
  background: none; border: none;
  font-family: var(--mono); font-size: 10px;
  color: var(--mid); 
  letter-spacing: .15em; text-transform: uppercase;
  transition: color .2s;
  padding: 0;
}
.nav-exit:hover { color: var(--red); }

/* ── MAIN ── */
.main { padding: 52px; max-width: 1240px; margin: 0 auto; }

/* ── HEADLINE ── */
.headline { margin-bottom: 64px; }
.hl-eyebrow {
  font-size: 9px; letter-spacing: .35em; text-transform: uppercase;
  color: var(--ion); margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.hl-eyebrow::after { content: ''; flex: 1; max-width: 60px; height: 1px; background: var(--ion); opacity: .4; }
.hl-title {
  font-family: var(--serif);
  font-size: clamp(42px, 5vw, 68px);
  font-weight: 300; font-style: italic;
  color: var(--t); line-height: 1.05;
  letter-spacing: -.02em;
}
.hl-title em { font-style: normal; color: var(--ion); }

/* ── STAT ROW ── */
.stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  border: 1px solid var(--b);
  margin-bottom: 64px;
  background: var(--b);
}
.stat {
  background: var(--void);
  padding: 28px 24px;
  transition: background .2s;
}
.stat:hover { background: rgba(79,195,247,0.03); }
.stat-key {
  font-size: 8px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 12px;
}
.stat-num {
  font-family: var(--serif);
  font-size: 44px; font-weight: 300;
  line-height: 1; margin-bottom: 6px;
}
.stat-desc { font-size: 9px; color: var(--dim); letter-spacing: .05em; }

/* ── TOOLBAR ── */
.toolbar {
  display: flex; align-items: center; gap: 24px;
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--b);
}
.filter-set { display: flex; gap: 2px; }
.f {
  background: none; border: none;
  font-family: var(--mono); font-size: 9px;
  letter-spacing: .15em; text-transform: uppercase;
  color: var(--dim); 
  padding: 6px 14px; transition: all .15s;
  border-bottom: 1px solid transparent;
}
.f:hover { color: var(--mid); }
.f.on { color: var(--ion); border-bottom-color: var(--ion); }
.f.on.green { color: var(--green); border-bottom-color: var(--green); }
.f.on.amber { color: var(--amber); border-bottom-color: var(--amber); }
.search-box { margin-left: auto; position: relative; }
.search-box input {
  background: none; border: none;
  border-bottom: 1px solid var(--b);
  font-family: var(--mono); font-size: 11px;
  color: var(--t); outline: none; width: 220px;
  padding: 6px 0; letter-spacing: .02em;
  transition: border-color .2s;
}
.search-box input:focus { border-bottom-color: var(--ion); }
.search-box input::placeholder { color: var(--dim); }

/* ── TABLE ── */
.tbl-outer { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--b); }
th {
  padding: 0 0 12px;
  text-align: left;
  font-size: 8px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--dim); font-weight: 400;
}
th:not(:first-child) { padding-left: 24px; }
tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.03);
  
  transition: all .15s;
}
tbody tr:hover { background: rgba(79,195,247,0.025); }
tbody tr:hover .arrow { opacity: 1; }
td { padding: 18px 0; vertical-align: middle; }
td:not(:first-child) { padding-left: 24px; }

/* CELLS */
.c-name { font-family: var(--serif); font-size: 16px; font-weight: 400; color: var(--t); margin-bottom: 2px; }
.c-email { font-size: 9px; color: var(--dim); letter-spacing: .02em; }

.pip {
  display: inline-block; width: 5px; height: 5px;
  border-radius: 50%; margin-right: 8px;
  vertical-align: middle;
}
.plan-txt { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; vertical-align: middle; }

.mrr-val { font-family: var(--serif); font-size: 18px; font-weight: 300; }

.cbar-wrap { display: flex; align-items: center; gap: 10px; }
.cbar { width: 40px; height: 1px; background: var(--dim); }
.cbar-fill { height: 100%; transition: width .4s ease; }
.cbar-num { font-size: 9px; color: var(--dim); }

.date-v { font-size: 10px; color: var(--mid); }

.arrow {
  font-size: 12px; color: var(--ion);
  opacity: 0; transition: opacity .15s;
  font-family: var(--serif);
}

.empty-state {
  padding: 80px 0; text-align: center;
  font-size: 9px; letter-spacing: .3em;
  text-transform: uppercase; color: var(--dim);
}

/* ── ANIMATIONS ── */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.fade-in { opacity:0; animation: fadeIn .6s ease forwards; }
.d1 { animation-delay: .1s; }
.d2 { animation-delay: .2s; }
.d3 { animation-delay: .3s; }

@media(max-width:900px) {
  .stats { grid-template-columns: 1fr 1fr; }
  .main { padding: 24px; }
  nav { padding: 20px 24px; }
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- ENTRY -->
<div id="entry">
  <div class="entry-glyph">∞</div>
  <div class="entry-line"></div>
  <div class="entry-sub">Authenticating neural link</div>
</div>

<div id="ui">
  <nav>
    <a href="/" class="nav-brand">
      <span class="nav-brand-name">targetdash</span>
      <span class="nav-brand-mode">god mode</span>
    </a>
    <div class="nav-right">
      <span class="nav-clock" id="clock"></span>
      <button class="nav-exit" onclick="so()">disconnect</button>
    </div>
  </nav>
  <div class="main" id="main"></div>
</div>

<script>
// ── NEURAL NETWORK ────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, nodes = [], tick = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function initNodes() {
  nodes = Array.from({ length: 60 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - .5) * .3,
    vy: (Math.random() - .5) * .3,
    r: Math.random() * 1.5 + .5,
    pulse: Math.random() * Math.PI * 2,
  }));
}
initNodes();

function drawFrame() {
  ctx.clearRect(0, 0, W, H);
  tick += .008;

  nodes.forEach(n => {
    n.x += n.vx; n.y += n.vy; n.pulse += .02;
    if(n.x < 0 || n.x > W) n.vx *= -1;
    if(n.y < 0 || n.y > H) n.vy *= -1;
  });

  // Connections
  for(let i = 0; i < nodes.length; i++) {
    for(let j = i+1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if(d < 140) {
        const a = (1 - d/140) * 0.18;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(79,195,247,${a})`;
        ctx.lineWidth = .5;
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.stroke();
      }
    }
  }

  // Nodes
  nodes.forEach(n => {
    const glow = .4 + .3 * Math.sin(n.pulse);
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(79,195,247,${glow})`;
    ctx.fill();
  });

  requestAnimationFrame(drawFrame);
}
drawFrame();

// ── AUTH ──────────────────────────────────────────────────────────────────
const SU = 'https://nghlvfngpfrhhigkoeem.supabase.co';
const SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5naGx2Zm5ncGZyaGhpZ2tvZWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDQyMTgsImV4cCI6MjA4OTIyMDIxOH0.Y4JF1x0m5BKa-btWkQAr1wY1EyTK30nck-hSL2eSNPE';
const SUPERS = ['niklas.isaksson@targetflow.fi'];
const { createClient } = supabase;
const sb = createClient(SU, SK);

let cl = [], fil = 'all', srch = '';

// Clock
setInterval(() => {
  const el = document.getElementById('clock');
  if(el) {
    const n = new Date();
    const p = x => String(x).padStart(2,'0');
    el.textContent = `${n.toISOString().split('T')[0]}  ${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  }
}, 1000);

(async () => {
  await new Promise(r => setTimeout(r, 2000));

  const { data: { session } } = await sb.auth.getSession();
  if(!session)                              { window.location.href = '/login'; return; }
  if(!SUPERS.includes(session.user.email)) { window.location.href = '/dashboard'; return; }

  const [{ data: prof }, { data: cred }] = await Promise.all([
    sb.from('user_profiles').select('*').order('created_at', { ascending: false }),
    sb.from('demo_credits').select('user_id,credits_used'),
  ]);
  const cm = {};
  (cred || []).forEach(c => cm[c.user_id] = c.credits_used);
  cl = (prof || []).map(p => ({ ...p, credits_used: cm[p.user_id] || 0 }));

  // Fade out entry
  document.getElementById('entry').classList.add('fade');
  setTimeout(() => {
    document.getElementById('entry').style.display = 'none';
    document.getElementById('ui').style.display = '';
    render();
  }, 1000);
})();

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const rows = cl.filter(c => {
    if(fil === 'paid'      && c.plan !== 'mainuser')  return false;
    if(fil === 'demo'      && c.plan !== 'demo')      return false;
    if(fil === 'cancelled' && c.plan !== 'cancelled') return false;
    if(srch) {
      const q = srch.toLowerCase();
      if(!c.company_name?.toLowerCase().includes(q) && !c.email?.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const tot  = cl.length;
  const paid = cl.filter(c => c.plan === 'mainuser').length;
  const dem  = cl.filter(c => c.plan === 'demo').length;
  const can  = cl.filter(c => c.plan === 'cancelled').length;
  const mrr  = paid * 80;
  const conv = dem > 0 ? Math.round(paid/dem*100) : 0;

  document.getElementById('main').innerHTML = `
  <div class="headline fade-in d1">
    <div class="hl-eyebrow">Neural command interface</div>
    <h1 class="hl-title">All <em>minds</em><br>accounted for.</h1>
  </div>

  <div class="stats fade-in d2">
    <div class="stat">
      <div class="stat-key">Accounts</div>
      <div class="stat-num" style="color:var(--t)">${tot}</div>
      <div class="stat-desc">total nodes</div>
    </div>
    <div class="stat">
      <div class="stat-key">Active</div>
      <div class="stat-num" style="color:var(--green)">${paid}</div>
      <div class="stat-desc">paid subscriptions</div>
    </div>
    <div class="stat">
      <div class="stat-key">MRR</div>
      <div class="stat-num" style="color:var(--green)">€${mrr.toLocaleString()}</div>
      <div class="stat-desc">${paid} × €80 / month</div>
    </div>
    <div class="stat">
      <div class="stat-key">Demo</div>
      <div class="stat-num" style="color:var(--amber)">${dem}</div>
      <div class="stat-desc">free tier</div>
    </div>
    <div class="stat">
      <div class="stat-key">Conversion</div>
      <div class="stat-num" style="color:var(--ion)">${conv}<span style="font-size:22px;color:var(--dim)">%</span></div>
      <div class="stat-desc">demo → paid</div>
    </div>
  </div>

  <div class="toolbar fade-in d3">
    <div class="filter-set">
      <button class="f${fil==='all'?' on':''}"      onclick="sf('all')">all</button>
      <button class="f green${fil==='paid'?' on green':''}" onclick="sf('paid')">paid</button>
      <button class="f amber${fil==='demo'?' on amber':''}" onclick="sf('demo')">demo</button>
      <button class="f${fil==='cancelled'?' on':''}" onclick="sf('cancelled')">cancelled</button>
    </div>
    <div class="search-box">
      <input placeholder="search…" value="${srch}" oninput="ss(this.value)" autocomplete="off"/>
    </div>
  </div>

  <div class="tbl-outer fade-in d3">
    <table>
      <thead>
        <tr>
          <th>Entity</th>
          <th>Status</th>
          <th>MRR</th>
          <th>Credits</th>
          <th>Joined</th>
          <th>Last seen</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${rows.length === 0
          ? `<tr><td colspan="7"><div class="empty-state">no signals found</div></td></tr>`
          : rows.map(rrow).join('')}
      </tbody>
    </table>
  </div>`;
}

function rrow(c) {
  const planColor = c.plan === 'mainuser' ? 'var(--green)' : c.plan === 'demo' ? 'var(--amber)' : c.plan === 'cancelled' ? 'var(--red)' : 'var(--dim)';
  const planText  = c.plan === 'mainuser' ? 'active' : c.plan === 'demo' ? 'demo' : c.plan === 'cancelled' ? 'cancelled' : 'pending';
  const mrr       = c.plan === 'mainuser'
    ? `<span class="mrr-val" style="color:var(--green)">€80</span>`
    : `<span class="mrr-val" style="color:var(--dim)">—</span>`;
  const u   = c.credits_used || 0;
  const pct = Math.min(100, u/5*100);
  const cbar = `<div class="cbar-wrap">
    <div class="cbar"><div class="cbar-fill" style="width:${pct}%;background:${u>=5?'var(--amber)':'var(--ion)'}"></div></div>
    <span class="cbar-num">${u}/5</span>
  </div>`;
  const fd  = d => d ? new Date(d).toLocaleDateString('fi-FI') : '—';
  const url = c.plan === 'demo' ? '/demo' : '/dashboard';

  return `<tr onclick="go('${url}')">
    <td>
      <div class="c-name">${c.company_name || 'unnamed'}</div>
      <div class="c-email">${c.email || ''}</div>
    </td>
    <td><span class="pip" style="background:${planColor}"></span><span class="plan-txt" style="color:${planColor}">${planText}</span></td>
    <td>${mrr}</td>
    <td>${cbar}</td>
    <td><span class="date-v">${fd(c.created_at)}</span></td>
    <td><span class="date-v">${fd(c.agreed_at)}</span></td>
    <td><span class="arrow">→</span></td>
  </tr>`;
}

function sf(f) { fil = f; render(); }
function ss(s) { srch = s; render(); }
function go(u) { window.location.href = u; }
async function so() { await sb.auth.signOut(); window.location.href = '/login'; }

window.sf = sf; window.ss = ss; window.go = go; window.so = so;
</script>
</body>
</html>
