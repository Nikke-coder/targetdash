<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>targetdash › god mode</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#03040a;--bg2:#07080f;--bg3:#0c0d15;
  --b:rgba(79,195,247,0.1);--bhi:rgba(79,195,247,0.2);
  --ion:#4fc3f7;--ion-lo:rgba(79,195,247,0.07);
  --ion-glow:0 0 40px rgba(79,195,247,0.4),0 0 100px rgba(79,195,247,0.15);
  --t:#e8f4fc;--mid:#4a6278;--dim:#1e2d3d;
  --green:#34d399;--amber:#fbbf24;--red:#f87171;--violet:#a78bfa;
  --sans:'Outfit',sans-serif;--ui:'Instrument Sans',sans-serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--t);font-family:var(--sans);}
/* ENTRY */
#entry{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);}
#entry canvas{position:absolute;inset:0;z-index:0;}
.ec{position:relative;z-index:1;text-align:center;}
.eg{font-family:var(--sans);font-size:68px;font-weight:700;color:var(--ion);letter-spacing:-.04em;line-height:1;text-shadow:var(--ion-glow);opacity:0;animation:gin 1.6s ease forwards .3s;margin-bottom:12px;}
.et{font-family:var(--ui);font-size:13px;letter-spacing:.25em;text-transform:uppercase;color:rgba(79,195,247,0.5);opacity:0;animation:gin 1s ease forwards 1.2s;}
@keyframes gin{0%{opacity:0;filter:blur(10px);}70%{opacity:1;filter:blur(0);}100%{opacity:1;}}
/* DASH */
#dash{display:none;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:58px;border-bottom:1px solid var(--b);background:var(--bg2);position:sticky;top:0;z-index:10;}
.brand{display:flex;align-items:center;text-decoration:none;}
.bn{font-family:var(--ui);font-size:15px;font-weight:600;color:var(--t);}
.bg2{color:var(--ion);font-size:16px;text-shadow:0 0 10px var(--ion);}
.bm{font-family:var(--ui);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ion);margin-left:10px;}
.nr{display:flex;align-items:center;gap:10px;}
#clock{font-size:11px;color:var(--mid);font-family:var(--ui);letter-spacing:.04em;}
.nbtn{background:var(--ion-lo);border:1px solid var(--b);border-radius:7px;padding:5px 12px;font-family:var(--ui);font-size:11px;color:var(--ion);cursor:pointer;transition:all .2s;}
.nbtn:hover{border-color:var(--ion);}
.abtn{background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.2);border-radius:7px;padding:5px 12px;font-family:var(--ui);font-size:11px;color:var(--amber);cursor:pointer;transition:all .2s;}
.abtn:hover{border-color:var(--amber);}
.xbtn{background:none;border:1px solid var(--b);border-radius:7px;padding:5px 12px;font-family:var(--ui);font-size:11px;color:var(--mid);cursor:pointer;transition:all .2s;}
.xbtn:hover{border-color:var(--red);color:var(--red);}
.wrap{max-width:1400px;margin:0 auto;padding:36px 40px;}
/* METRICS */
.mets{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--b);border:1px solid var(--b);margin-bottom:36px;}
.met{background:var(--bg);padding:20px;transition:background .2s;}
.met:hover{background:var(--bg2);}
.mk{font-family:var(--ui);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.15em;color:var(--mid);margin-bottom:8px;}
.mv{font-size:32px;font-weight:700;line-height:1;margin-bottom:4px;letter-spacing:-.04em;}
.ms{font-family:var(--ui);font-size:10px;color:var(--dim);}
/* TWO-COL */
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:36px;}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:36px;}
.panel{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:20px;}
.panel-title{font-family:var(--ui);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.15em;color:var(--ion);margin-bottom:16px;}
/* CHART */
.chart-wrap{position:relative;height:140px;display:flex;align-items:flex-end;gap:3px;padding-top:8px;}
.chart-bar{flex:1;border-radius:3px 3px 0 0;min-height:3px;transition:opacity .2s;cursor:pointer;position:relative;}
.chart-bar:hover{opacity:.8;}
.chart-bar .tt{position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--b);border-radius:5px;padding:4px 8px;font-family:var(--ui);font-size:10px;color:var(--t);white-space:nowrap;pointer-events:none;display:none;z-index:10;}
.chart-bar:hover .tt{display:block;}
.chart-labels{display:flex;gap:3px;margin-top:4px;}
.chart-label{flex:1;font-family:var(--ui);font-size:8px;color:var(--dim);text-align:center;}
/* FUNNEL */
.funnel-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.funnel-bar-bg{flex:1;height:20px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.funnel-bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.funnel-label{font-family:var(--ui);font-size:11px;color:var(--mid);min-width:110px;}
.funnel-val{font-family:var(--ui);font-size:11px;color:var(--t);font-weight:600;min-width:30px;text-align:right;}
.funnel-pct{font-family:var(--ui);font-size:10px;color:var(--dim);min-width:36px;text-align:right;}
/* SECTION */
.sh{display:flex;align-items:center;gap:12px;margin-bottom:14px;margin-top:36px;}
.sh-title{font-size:13px;font-weight:600;color:var(--ion);letter-spacing:.01em;}
.sh-count{font-family:var(--ui);font-size:10px;color:var(--mid);}
/* CLIENT CARDS */
.client-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.client-card{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;position:relative;}
.client-card:hover{border-color:var(--ion);background:rgba(79,195,247,0.04);}
.client-card:hover .card-arrow{opacity:1;transform:translateX(0);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.card-name{font-size:13px;font-weight:600;color:var(--t);margin-bottom:2px;}
.card-email{font-family:var(--ui);font-size:10px;color:var(--dim);}
.card-arrow{font-size:13px;color:var(--ion);opacity:0;transform:translateX(-4px);transition:all .15s;}
.card-plan{display:inline-flex;align-items:center;gap:5px;font-family:var(--ui);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.card-meta{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.card-row{display:flex;align-items:center;justify-content:space-between;font-family:var(--ui);font-size:10px;}
.card-key{color:var(--dim);}
.card-val{color:var(--mid);}
.churn-flag{position:absolute;top:10px;right:10px;background:rgba(241,113,113,0.12);border:1px solid rgba(241,113,113,0.3);border-radius:4px;padding:2px 7px;font-family:var(--ui);font-size:9px;color:var(--red);}
.pip{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px;vertical-align:middle;}
/* FILTER TABS */
.filters{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.ftab{background:none;border:1px solid var(--b);border-radius:5px;padding:4px 10px;font-family:var(--ui);font-size:9px;color:var(--mid);cursor:pointer;text-transform:uppercase;letter-spacing:.1em;transition:all .15s;}
.ftab.on{background:var(--ion-lo);border-color:var(--ion);color:var(--ion);}
.srch{background:var(--bg2);border:1px solid var(--b);border-radius:6px;padding:5px 10px;font-family:var(--ui);font-size:11px;color:var(--t);outline:none;width:180px;margin-left:auto;}
.srch:focus{border-color:var(--ion);}
/* TABLES */
.tw{border:1px solid var(--b);overflow:hidden;border-radius:10px;}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--b);background:var(--bg2);}
th{padding:9px 14px;text-align:left;font-family:var(--ui);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--mid);}
tbody tr{border-bottom:1px solid rgba(79,195,247,0.04);cursor:pointer;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover td{background:rgba(79,195,247,0.025);}
td{padding:10px 14px;vertical-align:middle;background:var(--bg);font-family:var(--ui);font-size:11px;color:var(--mid);}
.tname{font-size:13px;font-weight:600;color:var(--t);font-family:var(--sans);margin-bottom:1px;}
.temail{font-size:10px;color:var(--dim);}
/* ACTIVITY */
.act-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(79,195,247,0.05);}
.act-item:last-child{border-bottom:none;}
.act-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px;}
.act-body{flex:1;}
.act-title{font-family:var(--ui);font-size:11px;color:var(--t);margin-bottom:2px;}
.act-sub{font-family:var(--ui);font-size:10px;color:var(--dim);}
.act-time{font-family:var(--ui);font-size:10px;color:var(--dim);margin-top:2px;}
/* MODAL */
.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(3,4,10,0.85);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--bg2);border:1px solid var(--b);border-radius:14px;width:min(700px,96vw);max-height:92vh;overflow-y:auto;padding:28px;}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;}
.modal-title{font-size:20px;font-weight:700;color:var(--t);}
.modal-sub{font-family:var(--ui);font-size:11px;color:var(--dim);margin-top:3px;}
.modal-close{background:none;border:none;font-size:20px;color:var(--mid);cursor:pointer;padding:0;}
.modal-close:hover{color:var(--t);}
.modal-section{margin-bottom:18px;}
.modal-sec-title{font-family:var(--ui);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.15em;color:var(--ion);margin-bottom:10px;}
.modal-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(79,195,247,0.06);}
.modal-row:last-child{border-bottom:none;}
.modal-label{font-family:var(--ui);font-size:12px;color:var(--mid);}
.modal-val{font-family:var(--ui);font-size:12px;color:var(--t);font-weight:500;}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:18px;}
.act-btn{padding:9px;border-radius:8px;font-family:var(--ui);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid;text-align:center;}
.act-btn.primary{background:var(--ion-lo);border-color:var(--ion);color:var(--ion);}
.act-btn.success{background:rgba(52,211,153,0.08);border-color:var(--green);color:var(--green);}
.act-btn.danger{background:rgba(241,113,113,0.08);border-color:var(--red);color:var(--red);}
.act-btn.neutral{background:var(--bg3);border-color:var(--b);color:var(--mid);}
.act-btn.amber{background:rgba(251,191,36,0.08);border-color:var(--amber);color:var(--amber);}
.act-btn:hover{opacity:.8;}
.rsel{background:var(--bg2);border:1px solid var(--b);border-radius:4px;font-family:var(--ui);font-size:10px;color:var(--t);padding:4px 8px;outline:none;cursor:pointer;appearance:none;}
.rsel:focus{border-color:var(--ion);}
.rsel option{background:var(--bg2);}
.cw{display:flex;align-items:center;gap:5px;}
.cnum{font-size:14px;color:var(--t);min-width:28px;text-align:center;font-weight:600;}
.cbtn{background:var(--bg2);border:1px solid var(--b);width:22px;height:22px;border-radius:3px;font-size:13px;color:var(--mid);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;padding:0;}
.cbtn:hover{border-color:var(--ion);color:var(--ion);}
.cbtn.m:hover{border-color:var(--red);color:var(--red);}
.credit-input{background:var(--bg3);border:1px solid var(--b);border-radius:6px;padding:6px 10px;font-family:var(--ui);font-size:12px;color:var(--t);outline:none;width:64px;text-align:center;}
.credit-input:focus{border-color:var(--ion);}
.note-area{width:100%;background:var(--bg3);border:1px solid var(--b);border-radius:8px;padding:10px;font-family:var(--ui);font-size:12px;color:var(--t);outline:none;resize:vertical;min-height:80px;line-height:1.5;margin-top:6px;}
.note-area:focus{border-color:var(--ion);}
/* ERROR LOG */
.err-log{background:var(--bg2);border:1px solid rgba(241,113,113,0.2);border-radius:10px;overflow:hidden;}
.err-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid rgba(241,113,113,0.08);font-family:var(--ui);font-size:11px;}
.err-item:last-child{border-bottom:none;}
/* HEALTH */
.health-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:36px;}
.health-card{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:16px;}
.hlabel{font-family:var(--ui);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.15em;color:var(--mid);margin-bottom:8px;}
.hstatus{display:flex;align-items:center;gap:8px;font-family:var(--ui);font-size:13px;font-weight:600;}
.hdot{width:8px;height:8px;border-radius:50%;}
.hdot.ok{background:var(--green);box-shadow:0 0 8px var(--green);}
.hdot.warn{background:var(--amber);box-shadow:0 0 8px var(--amber);}
.hdot.err{background:var(--red);box-shadow:0 0 8px var(--red);}
.empty{padding:32px;text-align:center;font-family:var(--ui);font-size:11px;color:var(--dim);background:var(--bg);border:1px solid var(--b);border-radius:10px;}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--bg2);border:1px solid var(--b);border-radius:8px;padding:10px 18px;font-family:var(--ui);font-size:12px;color:var(--ion);opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:none;}
.toast.err{color:var(--red);border-color:rgba(241,113,113,0.3);}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fi{opacity:0;animation:fu .4s ease forwards;}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}
@media(max-width:1100px){.mets{grid-template-columns:1fr 1fr;}.two{grid-template-columns:1fr;}.three{grid-template-columns:1fr;}.client-grid{grid-template-columns:1fr 1fr;}.health-grid{grid-template-columns:1fr;}}
@media(max-width:700px){.wrap{padding:20px;}.nav{padding:0 20px;}.client-grid{grid-template-columns:1fr;}.modal-actions{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="entry">
  <canvas id="ec"></canvas>
  <div class="ec"><div class="eg">God Mode</div><div class="et">Don't be evil.</div></div>
</div>
<div id="dash">
  <div class="nav">
    <div style="display:flex;align-items:center;">
      <a href="/" class="brand"><span class="bn">targetdash</span><span class="bg2">&gt;</span></a>
      <span class="bm">god mode</span>
    </div>
    <div class="nr">
      <span id="clock"></span>
      <button class="nbtn" onclick="openApp('https://app.targetdash.ai')">⚡ Production</button>
      <button class="abtn" onclick="openApp('https://demo.targetdash.ai')">◆ Demo</button>
      <button class="nbtn" style="color:var(--green);border-color:rgba(52,211,153,0.3);background:rgba(52,211,153,0.06);" onclick="openInvite()">+ New client</button>
      <button class="nbtn" onclick="reload()">↻ Refresh</button>
      <button class="xbtn" onclick="so()">Sign out</button>
    </div>
  </div>
  <div class="wrap" id="wrap"></div>
</div>
<div class="modal-bg" id="modal" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>

<!-- INVITE MODAL -->
<div class="modal-bg" id="invite-modal" style="display:none;" onclick="if(event.target===this)closeInvite()">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header">
      <div>
        <div class="modal-title">New client</div>
        <div class="modal-sub">Invite a company to targetdash. They'll receive an email with a magic link to activate their account.</div>
      </div>
      <button class="modal-close" onclick="closeInvite()">✕</button>
    </div>

    <div class="modal-section">
      <div class="modal-sec-title">Company details</div>
      <div class="modal-row">
        <span class="modal-label">Company name</span>
        <input id="inv-company" type="text" placeholder="Acme Oy" class="credit-input" style="width:200px;text-align:left;padding:6px 10px;"/>
      </div>
      <div class="modal-row">
        <span class="modal-label">Contact email</span>
        <input id="inv-email" type="email" placeholder="ceo@acme.fi" class="credit-input" style="width:200px;text-align:left;padding:6px 10px;"/>
      </div>
      <div class="modal-row">
        <span class="modal-label">Contact role</span>
        <select id="inv-role" class="rsel">
          <option>CEO</option><option>CFO</option><option>CMO</option>
          <option>CRO</option><option>CTO</option><option>HR Manager</option>
        </select>
      </div>
      <div class="modal-row">
        <span class="modal-label">Plan</span>
        <select id="inv-plan" class="rsel">
          <option value="mainuser">MainUser — €80/mo</option>
          <option value="demo">Demo — free</option>
          <option value="inactive">Inactive — no access</option>
        </select>
      </div>
    </div>

    <div id="inv-status" style="display:none;padding:10px 12px;border-radius:8px;font-family:var(--ui);font-size:12px;margin-bottom:12px;"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <button class="act-btn neutral" onclick="closeInvite()">Cancel</button>
      <button class="act-btn success" id="inv-btn" onclick="sendInvite()">Send invite →</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── ENTRY PARTICLES ────────────────────────────────────────────────────────
const ec=document.getElementById('ec'),ex=ec.getContext('2d');
let eW=ec.width=innerWidth,eH=ec.height=innerHeight;
window.addEventListener('resize',()=>{eW=ec.width=innerWidth;eH=ec.height=innerHeight;});
const ePts=Array.from({length:60},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vy:-(Math.random()*.35+.08),vx:(Math.random()-.5)*.12,r:Math.random()*1.2+.4,ph:Math.random()*Math.PI*2}));
let eAnim;
(function eF(){eAnim=requestAnimationFrame(eF);ex.clearRect(0,0,eW,eH);ePts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.ph+=.016;if(p.y<-10){p.y=eH+10;p.x=Math.random()*eW;}if(p.x<0)p.x=eW;if(p.x>eW)p.x=0;});for(let i=0;i<ePts.length;i++)for(let j=i+1;j<ePts.length;j++){const dx=ePts[i].x-ePts[j].x,dy=ePts[i].y-ePts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){ex.beginPath();ex.strokeStyle=`rgba(79,195,247,${(1-d/130)*.13})`;ex.lineWidth=.4;ex.moveTo(ePts[i].x,ePts[i].y);ex.lineTo(ePts[j].x,ePts[j].y);ex.stroke();}}ePts.forEach(p=>{ex.beginPath();ex.arc(p.x,p.y,p.r,0,Math.PI*2);ex.fillStyle=`rgba(79,195,247,${.25+.2*Math.sin(p.ph)})`;ex.fill();});})();

// ── SUPABASE ──────────────────────────────────────────────────────────────
const SU='https://nghlvfngpfrhhigkoeem.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5naGx2Zm5ncGZyaGhpZ2tvZWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDQyMTgsImV4cCI6MjA4OTIyMDIxOH0.Y4JF1x0m5BKa-btWkQAr1wY1EyTK30nck-hSL2eSNPE';
const SUPERS=['niklas.isaksson@targetflow.fi'];
const {createClient}=supabase;
const sb=createClient(SU,SK);
let cl=[],stats={},notes={},errLog=[],activeFilter='all',srch='';
const thisMonth=new Date().toISOString().slice(0,7);

setInterval(()=>{const e=document.getElementById('clock');if(!e)return;const n=new Date(),p=x=>String(x).padStart(2,'0');e.textContent=`${n.toISOString().split('T')[0]} · ${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;},1000);

// ── INIT ──────────────────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if(event !== 'INITIAL_SESSION' && event !== 'SIGNED_IN') return;
  if(!session) { window.location.href='/login'; return; }
  if(!SUPERS.includes(session.user.email)) { window.location.href='/getstarted'; return; }
  await load();
  // Wait for animation (min 1400ms) before showing dash
  await new Promise(r=>setTimeout(r,1400));
  cancelAnimationFrame(eAnim);
  document.getElementById('entry').style.display='none';
  document.getElementById('dash').style.display='block';
  render();
});

async function load(){
  try{
    const [{data:prof,error:e1},{data:cred,error:e2}]=await Promise.all([
      sb.from('user_profiles').select('*').order('created_at',{ascending:false}),
      sb.from('demo_credits').select('user_id,credits_used'),
    ]);
    if(e1)logErr('user_profiles',e1.message);
    if(e2)logErr('demo_credits',e2.message);
    const cm={};(cred||[]).forEach(c=>cm[c.user_id]=c.credits_used);
    cl=(prof||[]).map(p=>({...p,credits_used:cm[p.user_id]||0,stats:stats[p.user_id]||null}));
    // Load notes from localStorage (simple persistence)
    try{const n=JSON.parse(localStorage.getItem('td_admin_notes')||'{}');Object.assign(notes,n);}catch(e){}
  }catch(e){logErr('load',e.message);}
  try{const {data:ums}=await sb.from('user_monthly_stats').select('*').eq('month',thisMonth);(ums||[]).forEach(s=>stats[s.user_id]=s);}catch(e){}
}

async function reload(){await load();render();toast('Refreshed ↻');}

// ── HELPERS ───────────────────────────────────────────────────────────────
const fmt=d=>d?new Date(d).toLocaleDateString('fi-FI'):'—';
const fmtM=d=>d?new Date(d).toLocaleString('fi-FI',{month:'short',year:'2-digit'}):'—';
const ago=d=>{if(!d)return'—';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';};
const daysSince=d=>{if(!d)return 999;return Math.floor((Date.now()-new Date(d))/(1000*60*60*24));};
const pc=p=>p==='mainuser'?'var(--green)':p==='demo'?'var(--amber)':p==='inactive'?'var(--red)':p==='superuser'?'var(--ion)':'var(--dim)';
const planLabel=p=>p==='mainuser'?'Active':p==='demo'?'Demo':p==='inactive'?'Inactive':p==='superuser'?'Superuser':'Pending';
const isChurnRisk=c=>c.plan==='mainuser'&&daysSince(c.stats?.last_opened)>14;
function logErr(ctx,msg){errLog.unshift({time:new Date().toLocaleTimeString('fi-FI'),ctx,msg});if(errLog.length>20)errLog.pop();}
function toast(m,isErr=false){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(isErr?' err':'');setTimeout(()=>t.classList.remove('show'),2500);}

// ── COMPUTE MRR HISTORY (from signup dates) ───────────────────────────────
function mrrHistory(){
  // Build month buckets for last 8 months
  const months=[];
  for(let i=7;i>=0;i--){
    const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);
    months.push(d.toISOString().slice(0,7));
  }
  return months.map(m=>{
    // Count paid users who were activated by this month
    const count=cl.filter(c=>c.plan==='mainuser'&&c.plan_activated_at&&c.plan_activated_at.slice(0,7)<=m).length;
    return {month:m,mrr:count*80,count};
  });
}

// ── COMPUTE ARR PROJECTION ────────────────────────────────────────────────
function arrProjection(){
  const paid=cl.filter(c=>c.plan==='mainuser').length;
  const demoLast30=cl.filter(c=>c.plan==='demo'&&daysSince(c.created_at)<=30).length;
  const convRate=0.15; // assumed 15% demo→paid
  const monthlyNewPaid=Math.round(demoLast30*convRate);
  const arr6=Math.round((paid+monthlyNewPaid*6)*80*12);
  const arr12=Math.round((paid+monthlyNewPaid*12)*80*12);
  return {current:paid*80*12,m6:arr6,m12:arr12,monthlyGrowth:monthlyNewPaid};
}

function closeModal(){document.getElementById('modal').style.display='none';}

function saveNote(uid){
  const val=document.getElementById('note-'+uid)?.value||'';
  notes[uid]=val;
  try{localStorage.setItem('td_admin_notes',JSON.stringify(notes));}catch(e){}
  toast('Note saved 📝');
  render();
}

async function quickAction(uid,action){
  const c=cl.find(x=>x.user_id===uid);if(!c)return;
  if(action==='upgrade'){await updatePlan(uid,'mainuser');}
  else if(action==='resetdemo'){
    const {error}=await sb.from('demo_credits').upsert({user_id:uid,user_email:c.email,credits_used:0},{onConflict:'user_id'});
    if(error){toast('Error: '+error.message,true);return;}
    const i=cl.findIndex(x=>x.user_id===uid);if(i>-1)cl[i].credits_used=0;
    toast('Demo credits reset');openModal(uid);render();
  }else if(action==='deactivate'){
    if(!confirm(`Deactivate ${c.company_name||c.email}?`))return;
    await updatePlan(uid,'inactive');closeModal();
  }
}

async function setCredits(uid){
  const val=parseInt(document.getElementById('cust-cr')?.value);
  if(isNaN(val)||val<0)return;
  const c=cl.find(x=>x.user_id===uid);if(!c)return;
  const {error}=await sb.from('demo_credits').upsert({user_id:uid,user_email:c.email,credits_used:val},{onConflict:'user_id'});
  if(error){toast('Error: '+error.message,true);return;}
  const i=cl.findIndex(x=>x.user_id===uid);if(i>-1)cl[i].credits_used=val;
  toast('Credits set to '+val);openModal(uid);render();
}

async function updatePlan(uid,plan){
  const {error}=await sb.from('user_profiles').update({plan,updated_at:new Date().toISOString()}).eq('user_id',uid);
  if(error){logErr('updatePlan',error.message);toast('Error: '+error.message,true);return;}
  const i=cl.findIndex(c=>c.user_id===uid);if(i>-1)cl[i].plan=plan;
  toast('Plan → '+plan);openModal(uid);render();
}

async function updateRole(uid,role){
  const {error}=await sb.from('user_profiles').update({primary_role:role,updated_at:new Date().toISOString()}).eq('user_id',uid);
  if(error){logErr('updateRole',error.message);toast('Error: '+error.message,true);return;}
  const i=cl.findIndex(c=>c.user_id===uid);if(i>-1)cl[i].primary_role=role;
  toast('Role → '+role);
}

async function adjCredit(uid,delta){
  const i=cl.findIndex(c=>c.user_id===uid);if(i<0)return;
  const next=Math.max(0,(cl[i].credits_used||0)+delta);
  const {error}=await sb.from('demo_credits').upsert({user_id:uid,user_email:cl[i].email,credits_used:next},{onConflict:'user_id'});
  if(error){logErr('adjCredit',error.message);toast('Error: '+error.message,true);return;}
  cl[i].credits_used=next;
  toast((delta>0?'+':'')+delta+' credit'+(Math.abs(delta)>1?'s':''));
  openModal(uid);render();
}

// ── OPEN APP ──────────────────────────────────────────────────────────────
function openApp(url){ window.open(url,'_blank'); }
window.openApp=openApp;
function setSrch(s){srch=s;render();}
function clearErrors(){errLog=[];render();}
async function so(){await sb.auth.signOut();window.location.href='/login';}

// ── INVITE ────────────────────────────────────────────────────────────────
function openInvite(){
  document.getElementById('inv-company').value='';
  document.getElementById('inv-email').value='';
  document.getElementById('inv-role').value='CEO';
  document.getElementById('inv-plan').value='mainuser';
  document.getElementById('inv-status').style.display='none';
  document.getElementById('inv-btn').disabled=false;
  document.getElementById('inv-btn').textContent='Send invite →';
  document.getElementById('invite-modal').style.display='flex';
  setTimeout(()=>document.getElementById('inv-company').focus(),100);
}
function closeInvite(){document.getElementById('invite-modal').style.display='none';}

async function sendInvite(){
  const company=document.getElementById('inv-company').value.trim();
  const email=document.getElementById('inv-email').value.trim();
  const role=document.getElementById('inv-role').value;
  const plan=document.getElementById('inv-plan').value;
  const btn=document.getElementById('inv-btn');
  if(!company){showInvStatus('Enter a company name','err');return;}
  if(!email||!email.includes('@')){showInvStatus('Enter a valid email','err');return;}
  btn.disabled=true;btn.textContent='Sending…';
  try{
    const res=await fetch('https://app.targetdash.ai/api/invite-member',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,company_name:company,role,plan,invited_by:'niklas.isaksson@targetflow.fi'})
    });
    const data=await res.json();
    if(!res.ok||data.error){showInvStatus('Error: '+data.error,'err');btn.disabled=false;btn.textContent='Send invite →';return;}
    showInvStatus(`✓ Invite sent to ${email}. They'll get a magic link to activate.`+(data.note?' ('+data.note+')':''),'ok');
    btn.textContent='Sent ✓';
    await reload();
    setTimeout(closeInvite,3000);
  }catch(e){
    showInvStatus('Network error: '+e.message,'err');
    btn.disabled=false;btn.textContent='Send invite →';
  }
}

function showInvStatus(msg,type){
  const el=document.getElementById('inv-status');
  el.style.display='block';
  el.style.background=type==='ok'?'rgba(52,211,153,0.08)':'rgba(241,113,113,0.08)';
  el.style.border='1px solid '+(type==='ok'?'rgba(52,211,153,0.3)':'rgba(241,113,113,0.3)');
  el.style.color=type==='ok'?'var(--green)':'var(--red)';
  el.textContent=msg;
}

window.setFilter=setFilter;window.setSrch=setSrch;window.openModal=openModal;window.closeModal=closeModal;
window.quickAction=quickAction;window.setCredits=setCredits;window.saveNote=saveNote;
window.updatePlan=updatePlan;window.updateRole=updateRole;window.adjCredit=adjCredit;
window.clearErrors=clearErrors;window.so=so;window.reload=reload;
window.openInvite=openInvite;window.closeInvite=closeInvite;window.sendInvite=sendInvite;
</script>
