<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>targetdash › god mode</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --void:#04050a;--ink:#080a10;--veil:#0d0f18;
  --b:rgba(255,255,255,0.06);--bhi:rgba(255,255,255,0.1);
  --ion:#4fc3f7;--ion-lo:rgba(79,195,247,0.07);
  --ion-glow:0 0 40px rgba(79,195,247,0.35),0 0 100px rgba(79,195,247,0.12);
  --violet:#7c3aed;--vhi:#a78bfa;
  --t:#e8eaf0;--mid:#4a5568;--dim:#2a3040;
  --green:#4caf82;--amber:#d4a24c;--red:#c45c5c;
  --serif:'Cormorant Garamond',serif;--mono:'IBM Plex Mono',monospace;
}
html,body{min-height:100vh;background:var(--void);color:var(--t);font-family:var(--mono);overflow-x:hidden;}

/* ── PARTICLE CANVAS ── */
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── ENTRY SCREEN ── */
#entry{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--void);
  transition:opacity 1.4s ease;
}
#entry.out{opacity:0;pointer-events:none;}

.entry-logo{
  font-family:var(--serif);font-size:52px;font-weight:300;
  color:var(--t);letter-spacing:-.02em;
  display:flex;align-items:baseline;gap:4px;
  margin-bottom:28px;
  opacity:0;animation:glow-in 1.8s ease forwards 0.4s;
}
.entry-logo-gt{
  font-style:italic;color:var(--ion);
  text-shadow:var(--ion-glow);
  animation:pulse-gt 3s ease infinite 2s;
}
@keyframes glow-in{
  0%{opacity:0;filter:blur(8px);}
  60%{opacity:1;filter:blur(0);}
  100%{opacity:1;filter:blur(0);}
}
@keyframes pulse-gt{
  0%,100%{text-shadow:var(--ion-glow);}
  50%{text-shadow:0 0 60px rgba(79,195,247,0.6),0 0 120px rgba(79,195,247,0.2);}
}
.entry-line{
  width:1px;height:48px;margin-bottom:20px;
  background:linear-gradient(to top,transparent,var(--ion));
  box-shadow:0 0 8px rgba(79,195,247,0.4);
  opacity:0;animation:fade-in 0.8s ease forwards 1.2s;
}
.entry-tag{
  font-size:9px;letter-spacing:.4em;text-transform:uppercase;
  color:var(--ion);
  opacity:0;animation:fade-in 0.8s ease forwards 1.6s;
}
@keyframes fade-in{to{opacity:1;}}

/* ── UI ── */
#ui{position:relative;z-index:10;min-height:100vh;display:none;}

/* ── NAV ── */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 52px;border-bottom:1px solid var(--b);
}
.brand{display:flex;align-items:baseline;gap:4px;text-decoration:none;}
.brand-name{font-family:var(--serif);font-size:17px;font-weight:400;color:var(--t);}
.brand-gt{font-family:var(--serif);font-style:italic;color:var(--ion);font-size:19px;text-shadow:0 0 12px rgba(79,195,247,0.4);}
.brand-mode{font-family:var(--mono);font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--mid);margin-left:8px;}
.nav-r{display:flex;align-items:center;gap:28px;}
#clock{font-size:10px;color:var(--mid);letter-spacing:.04em;}
.exit-btn{background:none;border:none;font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);cursor:pointer;transition:color .2s;padding:0;}
.exit-btn:hover{color:var(--red);}

/* ── MAIN ── */
.main{max-width:1260px;margin:0 auto;padding:52px;}

/* ── SECTION LABEL ── */
.sec{font-size:8px;letter-spacing:.35em;text-transform:uppercase;color:var(--dim);margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.sec::after{content:'';flex:1;max-width:40px;height:1px;background:var(--dim);}

/* ── HEADLINE ── */
.headline{margin-bottom:56px;}
.hl{font-family:var(--serif);font-size:clamp(40px,4.5vw,62px);font-weight:300;font-style:italic;color:var(--t);line-height:1.06;letter-spacing:-.02em;}
.hl em{font-style:normal;color:var(--ion);}

/* ── METRICS ROW ── */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--b);border:1px solid var(--b);margin-bottom:56px;}
.met{background:var(--void);padding:24px 20px;transition:background .2s;}
.met:hover{background:rgba(79,195,247,0.025);}
.met-k{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
.met-v{font-family:var(--serif);font-size:40px;font-weight:300;line-height:1;margin-bottom:4px;}
.met-s{font-size:9px;color:var(--dim);letter-spacing:.04em;}

/* ── FOLLOW-UP SECTION ── */
.follow-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b);border:1px solid var(--b);margin-bottom:56px;}
.follow-card{background:var(--void);padding:28px 24px;}
.fc-title{font-family:var(--serif);font-size:20px;font-weight:300;font-style:italic;color:var(--t);margin-bottom:20px;}
.fc-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.fc-item:last-child{border-bottom:none;}
.fc-label{font-size:10px;color:var(--mid);}
.fc-val{font-size:12px;font-weight:500;}
.fc-sub{font-size:9px;color:var(--dim);margin-top:2px;}
.pip{display:inline-block;width:4px;height:4px;border-radius:50%;margin-right:8px;vertical-align:middle;}

/* ── ACTIVITY FEED ── */
.activity{margin-bottom:56px;}
.act-item{display:flex;align-items:baseline;gap:16px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.act-time{font-size:9px;color:var(--dim);min-width:80px;flex-shrink:0;}
.act-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.act-text{font-size:11px;color:var(--mid);}
.act-text strong{color:var(--t);font-weight:500;}

/* ── CLIENT DASHBOARDS ── */
.clients-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--b);border:1px solid var(--b);}
.client-card{
  background:var(--void);padding:24px;
  cursor:pointer;transition:background .2s;
  display:flex;flex-direction:column;gap:0;
}
.client-card:hover{background:rgba(79,195,247,0.025);}
.client-card:hover .cc-arrow{opacity:1;transform:translateX(0);}
.cc-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.cc-name{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--t);line-height:1.2;}
.cc-arrow{font-size:14px;color:var(--ion);opacity:0;transform:translateX(-4px);transition:all .15s;}
.cc-plan{display:inline-flex;align-items:center;gap:6px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}
.cc-meta{display:flex;flex-direction:column;gap:4px;}
.cc-row{display:flex;align-items:center;justify-content:space-between;}
.cc-key{font-size:9px;color:var(--dim);}
.cc-data{font-size:10px;color:var(--mid);}
.cbar-w{display:flex;align-items:center;gap:8px;}
.cbar{width:32px;height:1px;background:var(--dim);}
.cbar-f{height:100%;}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:20px;margin-bottom:20px;}
.f{background:none;border:none;font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);cursor:pointer;padding:4px 0;border-bottom:1px solid transparent;transition:all .15s;}
.f:hover{color:var(--mid);}
.f.on{color:var(--ion);border-bottom-color:var(--ion);}
.f.on.g{color:var(--green);border-bottom-color:var(--green);}
.f.on.a{color:var(--amber);border-bottom-color:var(--amber);}
.sbox{margin-left:auto;}
.sbox input{background:none;border:none;border-bottom:1px solid var(--b);font-family:var(--mono);font-size:11px;color:var(--t);outline:none;width:200px;padding:4px 0;letter-spacing:.02em;transition:border-color .2s;}
.sbox input:focus{border-bottom-color:var(--ion);}
.sbox input::placeholder{color:var(--dim);}

.empty-state{padding:48px;text-align:center;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fi{opacity:0;animation:fadeUp .5s ease forwards;}
.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}.d4{animation-delay:.4s}

@media(max-width:1100px){.metrics{grid-template-columns:1fr 1fr;}.follow-grid{grid-template-columns:1fr;}.clients-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:700px){.clients-grid{grid-template-columns:1fr;}.main{padding:24px;}nav{padding:16px 24px;}}
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- ENTRY -->
<div id="entry">
  <div class="entry-logo">
    targetdash<span class="entry-logo-gt">&gt;</span>
  </div>
  <div class="entry-line"></div>
  <div class="entry-tag">god mode</div>
</div>

<!-- UI -->
<div id="ui">
  <nav>
    <div style="display:flex;align-items:baseline;">
      <a href="/" class="brand">
        <span class="brand-name">targetdash</span><span class="brand-gt">&gt;</span>
      </a>
      <span class="brand-mode">god mode</span>
    </div>
    <div class="nav-r">
      <span id="clock"></span>
      <button class="exit-btn" onclick="so()">disconnect</button>
    </div>
  </nav>
  <div class="main" id="main"></div>
</div>

<script>
// ── PARTICLES — RISE UPWARD ───────────────────────────────────────────────
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W, H, pts = [];

function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function mkPts(){
  pts = Array.from({length:70}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    vy: -(Math.random() * 0.4 + 0.1),   // always upward
    vx: (Math.random() - .5) * 0.15,
    r:  Math.random() * 1.2 + 0.3,
    ph: Math.random() * Math.PI * 2,
  }));
}
mkPts();

(function frame(){
  cx.clearRect(0,0,W,H);

  pts.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.ph += 0.018;
    // Wrap at top — reappear at bottom
    if(p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
    if(p.x < 0)   p.x = W;
    if(p.x > W)   p.x = 0;
  });

  // Connections
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<130){
        cx.beginPath();
        cx.strokeStyle=`rgba(79,195,247,${(1-d/130)*0.15})`;
        cx.lineWidth=.4;
        cx.moveTo(pts[i].x,pts[i].y);
        cx.lineTo(pts[j].x,pts[j].y);
        cx.stroke();
      }
    }
  }

  // Nodes
  pts.forEach(p=>{
    const a = 0.3 + 0.25*Math.sin(p.ph);
    cx.beginPath();
    cx.arc(p.x,p.y,p.r,0,Math.PI*2);
    cx.fillStyle=`rgba(79,195,247,${a})`;
    cx.fill();
  });

  requestAnimationFrame(frame);
})();

// ── SUPABASE ──────────────────────────────────────────────────────────────
const SU='https://nghlvfngpfrhhigkoeem.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5naGx2Zm5ncGZyaGhpZ2tvZWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDQyMTgsImV4cCI6MjA4OTIyMDIxOH0.Y4JF1x0m5BKa-btWkQAr1wY1EyTK30nck-hSL2eSNPE';
const SUPERS=['niklas.isaksson@targetflow.fi'];
const {createClient}=supabase;
const sb=createClient(SU,SK);
let cl=[],fil='all',srch='';

// ── CLOCK ─────────────────────────────────────────────────────────────────
setInterval(()=>{
  const e=document.getElementById('clock');
  if(!e) return;
  const n=new Date(),p=x=>String(x).padStart(2,'0');
  e.textContent=`${n.toISOString().split('T')[0]}  ${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
},1000);

// ── INIT ──────────────────────────────────────────────────────────────────
(async()=>{
  await new Promise(r=>setTimeout(r,2400));
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='/login';return;}
  if(!SUPERS.includes(session.user.email)){window.location.href='/dashboard';return;}

  const [{data:prof},{data:cred}]=await Promise.all([
    sb.from('user_profiles').select('*').order('created_at',{ascending:false}),
    sb.from('demo_credits').select('user_id,credits_used'),
  ]);
  const cm={};(cred||[]).forEach(c=>cm[c.user_id]=c.credits_used);
  cl=(prof||[]).map(p=>({...p,credits_used:cm[p.user_id]||0}));

  document.getElementById('entry').classList.add('out');
  setTimeout(()=>{
    document.getElementById('entry').style.display='none';
    document.getElementById('ui').style.display='';
    render();
  },1400);
})();

// ── RENDER ────────────────────────────────────────────────────────────────
function fmt(d){ return d ? new Date(d).toLocaleDateString('fi-FI') : '—'; }
function ago(d){
  if(!d) return '—';
  const s=Math.floor((Date.now()-new Date(d))/1000);
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function render(){
  const paid=cl.filter(c=>c.plan==='mainuser');
  const demo=cl.filter(c=>c.plan==='demo');
  const pend=cl.filter(c=>!c.plan||c.plan==='subscribe');
  const can=cl.filter(c=>c.plan==='cancelled');
  const mrr=paid.length*80;
  const conv=demo.length>0?Math.round(paid.length/demo.length*100):0;
  const demoExhausted=demo.filter(c=>(c.credits_used||0)>=5);
  const demoActive=demo.filter(c=>(c.credits_used||0)<5);

  // Recent activity (last 5 signed up)
  const recent=[...cl].slice(0,5);

  // Filtered clients for the dashboard list
  const rows=paid.filter(c=>{
    if(!srch) return true;
    const q=srch.toLowerCase();
    return c.company_name?.toLowerCase().includes(q)||c.email?.toLowerCase().includes(q);
  });

  document.getElementById('main').innerHTML=`

  <div class="headline fi d1">
    <div class="sec">neural command interface</div>
    <h1 class="hl">All <em>minds</em> accounted for.</h1>
  </div>

  <!-- METRICS -->
  <div class="metrics fi d2">
    <div class="met">
      <div class="met-k">MRR</div>
      <div class="met-v" style="color:var(--green)">€${mrr.toLocaleString()}</div>
      <div class="met-s">${paid.length} × €80 / month</div>
    </div>
    <div class="met">
      <div class="met-k">Active clients</div>
      <div class="met-v" style="color:var(--green)">${paid.length}</div>
      <div class="met-s">paid MainUser plan</div>
    </div>
    <div class="met">
      <div class="met-k">Demo pipeline</div>
      <div class="met-v" style="color:var(--amber)">${demo.length}</div>
      <div class="met-s">${demoExhausted.length} credits used up</div>
    </div>
    <div class="met">
      <div class="met-k">Conversion</div>
      <div class="met-v" style="color:var(--ion)">${conv}<span style="font-size:22px;color:var(--dim)">%</span></div>
      <div class="met-s">demo → paid</div>
    </div>
    <div class="met">
      <div class="met-k">Total nodes</div>
      <div class="met-v" style="color:var(--t)">${cl.length}</div>
      <div class="met-s">${pend.length} pending · ${can.length} cancelled</div>
    </div>
  </div>

  <!-- FOLLOW-UP -->
  <div class="fi d3" style="margin-bottom:56px;">
    <div class="sec">follow-up signals</div>
    <div class="follow-grid">

      <div class="follow-card">
        <div class="fc-title">Demo pipeline</div>
        ${demoExhausted.length===0&&demoActive.length===0
          ? `<div class="fc-item"><span class="fc-label" style="color:var(--dim)">No demo users yet</span></div>`
          : ''}
        ${demoExhausted.map(c=>`
          <div class="fc-item">
            <div>
              <div class="fc-label"><span class="pip" style="background:var(--amber)"></span>${c.company_name||c.email}</div>
              <div class="fc-sub">Credits exhausted · joined ${fmt(c.created_at)}</div>
            </div>
            <span class="fc-val" style="color:var(--amber);font-size:9px;letter-spacing:.1em;">UPGRADE NOW</span>
          </div>`).join('')}
        ${demoActive.map(c=>`
          <div class="fc-item">
            <div>
              <div class="fc-label"><span class="pip" style="background:var(--green)"></span>${c.company_name||c.email}</div>
              <div class="fc-sub">${c.credits_used||0}/5 credits used · joined ${fmt(c.created_at)}</div>
            </div>
            <span class="fc-val" style="color:var(--green);font-size:9px;letter-spacing:.1em;">ACTIVE</span>
          </div>`).join('')}
      </div>

      <div class="follow-card">
        <div class="fc-title">Recent activity</div>
        ${recent.map(c=>{
          const planColor=c.plan==='mainuser'?'var(--green)':c.plan==='demo'?'var(--amber)':'var(--dim)';
          const planLabel=c.plan==='mainuser'?'paid':c.plan==='demo'?'demo':'pending';
          return `<div class="fc-item">
            <div>
              <div class="fc-label"><span class="pip" style="background:${planColor}"></span>${c.company_name||c.email}</div>
              <div class="fc-sub">${c.email||''}</div>
            </div>
            <div style="text-align:right;">
              <div class="fc-val" style="color:${planColor};font-size:9px;letter-spacing:.1em;">${planLabel.toUpperCase()}</div>
              <div class="fc-sub">${ago(c.created_at)}</div>
            </div>
          </div>`;
        }).join('')}
      </div>

    </div>
  </div>

  <!-- CLIENT DASHBOARDS -->
  <div class="fi d4">
    <div class="sec">active client dashboards</div>
    <div class="toolbar">
      <input class="sbox" style="all:unset;border-bottom:1px solid var(--b);font-family:var(--mono);font-size:11px;color:var(--t);padding:4px 0;width:220px;letter-spacing:.02em;" placeholder="search clients…" value="${srch}" oninput="ss(this.value)" autocomplete="off"/>
    </div>
    ${rows.length===0
      ? `<div style="border:1px solid var(--b);"><div class="empty-state">no active clients yet</div></div>`
      : `<div class="clients-grid">${rows.map(ccard).join('')}</div>`}
  </div>`;
}

function ccard(c){
  const u=c.credits_used||0,p=Math.min(100,u/5*100);
  return `<div class="client-card" onclick="go('/dashboard')">
    <div class="cc-head">
      <div class="cc-name">${c.company_name||'Unnamed'}</div>
      <span class="cc-arrow">→</span>
    </div>
    <div class="cc-plan">
      <span class="pip" style="background:var(--green)"></span>
      <span style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--green)">Active</span>
    </div>
    <div class="cc-meta">
      <div class="cc-row">
        <span class="cc-key">Email</span>
        <span class="cc-data">${c.email||'—'}</span>
      </div>
      <div class="cc-row">
        <span class="cc-key">MRR</span>
        <span class="cc-data" style="color:var(--green)">€80</span>
      </div>
      <div class="cc-row">
        <span class="cc-key">Role</span>
        <span class="cc-data">${c.primary_role||'—'}</span>
      </div>
      <div class="cc-row">
        <span class="cc-key">Since</span>
        <span class="cc-data">${fmt(c.plan_activated_at||c.created_at)}</span>
      </div>
      <div class="cc-row" style="margin-top:6px;">
        <span class="cc-key">Country</span>
        <span class="cc-data">${c.country||'—'}</span>
      </div>
    </div>
  </div>`;
}

function ss(s){srch=s;render();}
function go(u){window.location.href=u;}
async function so(){await sb.auth.signOut();window.location.href='/login';}
window.ss=ss;window.go=go;window.so=so;
</script>
</body>
</html>
